AWSTemplateFormatVersion: '2010-09-09'
Description: Kiro User Activity - Source Account (deploy in each account with Kiro profile enabled) v3.14.5
Metadata:
  AWS::CloudFormation::Interface:
    ParameterGroups:
      - Label:
          default: 'Deployment parameters'
        Parameters:
          - DestinationBucket
          - KiroActivityPrefix
          - ResourcePrefix
    ParameterLabels:
      DestinationBucket:
        default: 'Data Collection Destination Bucket Name'
      KiroActivityPrefix:
        default: 'S3 prefix for Kiro to write reports (include trailing slash)'
      ResourcePrefix:
        default: 'Resource Prefix'

Parameters:
  DestinationBucket:
    Type: String
    Description: "Name of the S3 bucket in the Data Collection account where data will be replicated to (e.g. cid-data-123456789012)"
    AllowedPattern: (?=^.{3,63}$)(?!^(\d+\.)+\d+$)(^(([a-z0-9]|[a-z0-9][a-z0-9\-]*[a-z0-9])\.)*([a-z0-9]|[a-z0-9][a-z0-9\-]*[a-z0-9])$)
  KiroActivityPrefix:
    Type: String
    Description: "S3 prefix (subfolder) where Kiro will write user activity reports. Must include trailing slash. This is the value you configure in the Kiro console."
    Default: "kiro/"
    AllowedPattern: ^.+\/$
  ResourcePrefix:
    Type: String
    Description: This prefix will be placed in front of all roles created. Must match the prefix used in the Data Collection stack.
    Default: "CID-DC-"
  BucketPrefix:
    Type: String
    Description: "Lowercase prefix for the S3 bucket name. Must be lowercase, numbers, and hyphens only."
    Default: "cid-dc-kiro-activity"
    AllowedPattern: ^[a-z0-9][a-z0-9\-]*[a-z0-9]$
  DataBucketsKmsKeysArns:
    Type: String
    Description: "ARNs of KMS Keys for data buckets. Comma separated list, no spaces. Keep empty if not encrypted with KMS."
    Default: ""

Conditions:
  NeedDataBucketsKms: !Not [ !Equals [ !Ref DataBucketsKmsKeysArns, "" ] ]

Outputs:
  KiroActivityBucketName:
    Description: "S3 bucket name to configure in the Kiro console for user activity reports"
    Value: !Ref KiroActivityBucket
  KiroActivityS3URI:
    Description: "Full S3 URI to configure in the Kiro console Settings > User Activity Reports"
    Value: !Sub "s3://${KiroActivityBucket}/${KiroActivityPrefix}"

Resources:
  ReplicationRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${ResourcePrefix}kiro-user-activity-ReplicationRole"
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: !Sub "s3.${AWS::URLSuffix}"
            Action: sts:AssumeRole
      Policies:
        - PolicyName: S3ReplicationSource
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetReplicationConfiguration
                  - s3:ListBucket
                Resource: !Sub "arn:${AWS::Partition}:s3:::${BucketPrefix}-${AWS::AccountId}"
              - Effect: Allow
                Action:
                  - s3:GetObjectVersionForReplication
                  - s3:GetObjectVersionAcl
                  - s3:GetObjectVersionTagging
                Resource: !Sub "arn:${AWS::Partition}:s3:::${BucketPrefix}-${AWS::AccountId}/*"
        - PolicyName: S3ReplicationDestination
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:ReplicateObject
                  - s3:ReplicateDelete
                  - s3:ReplicateTags
                  - s3:GetObjectVersionTagging
                Resource: !Sub "arn:${AWS::Partition}:s3:::${DestinationBucket}/${KiroActivityPrefix}*"
        - !If
          - NeedDataBucketsKms
          - PolicyName: "KMS"
            PolicyDocument:
              Version: "2012-10-17"
              Statement:
                - Effect: "Allow"
                  Action:
                    - "kms:Decrypt"
                    - "kms:GenerateDataKey"
                  Resource: !Split [ ',', !Ref DataBucketsKmsKeysArns ]
          - !Ref AWS::NoValue
    Metadata:
      cfn_nag:
        rules_to_suppress:
          - id: W28
            reason: "Need explicit name to identify role actions"

  KiroActivityBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "${BucketPrefix}-${AWS::AccountId}"
      VersioningConfiguration:
        Status: Enabled
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      ReplicationConfiguration:
        Role: !GetAtt ReplicationRole.Arn
        Rules:
          - Id: ReplicateToDataCollection
            Priority: 1
            Filter:
              Prefix: !Ref KiroActivityPrefix
            Destination:
              Bucket: !Sub "arn:${AWS::Partition}:s3:::${DestinationBucket}"
              StorageClass: STANDARD
              # S3 replication preserves the full source key path in the destination.
              # Kiro writes: s3://source/{KiroActivityPrefix}AWSLogs/{accountId}/KiroLogs/user_report/{region}/{year}/{month}/{day}/...
              # Replicates to: s3://{DestinationBucket}/{KiroActivityPrefix}AWSLogs/{accountId}/KiroLogs/user_report/{region}/{year}/{month}/{day}/...
              # The account_id in the path provides natural multi-account partitioning.
              #
              # KNOWN LIMITATION: Kiro occasionally writes access validation marker files directly in
              # .../KiroLogs/ (no extension, UUID-named). These get replicated too and confuse Athena/SPICE
              # refreshes since they're read as CSV. S3 replication filters don't support exclusions.
              # Workaround: the destination-side Glue Crawler uses Exclusions to skip them during
              # table discovery, but pre-existing validation files in the destination bucket may
              # need to be manually removed.
            DeleteMarkerReplication:
              Status: Disabled
            Status: Enabled
      LifecycleConfiguration:
        Rules:
          - Id: ExpireOldData
            Status: Enabled
            Prefix: !Ref KiroActivityPrefix
            ExpirationInDays: 90
          - Id: NoncurrentCleanup
            Status: Enabled
            NoncurrentVersionExpiration:
              NoncurrentDays: 7
          - Id: DeleteIncompleteMultipartUploads
            Status: Enabled
            AbortIncompleteMultipartUpload:
              DaysAfterInitiation: 7
    Metadata:
      cfn_nag:
        rules_to_suppress:
          - id: W35
            reason: "Access logging not required for this data bucket"
          - id: W51
            reason: "Bucket policy is defined separately"

  KiroActivityBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref KiroActivityBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          # Allow Kiro service to write user activity reports
          - Sid: KiroLogsWrite
            Effect: Allow
            Principal:
              Service: "q.amazonaws.com"
            Action:
              - s3:PutObject
              - s3:PutObjectAcl
              - s3:GetObject
              - s3:ListBucket
            Resource:
              - !Sub "arn:${AWS::Partition}:s3:::${KiroActivityBucket}/${KiroActivityPrefix}*"
              - !Sub "arn:${AWS::Partition}:s3:::${KiroActivityBucket}"
          # Deny non-SSL access
          - Sid: AllowSSLOnly
            Effect: Deny
            Principal: "*"
            Action: s3:*
            Resource:
              - !Sub "arn:${AWS::Partition}:s3:::${KiroActivityBucket}"
              - !Sub "arn:${AWS::Partition}:s3:::${KiroActivityBucket}/*"
            Condition:
              Bool:
                aws:SecureTransport: false
          # Deny TLS < 1.2
          - Sid: AllowTLS12Only
            Effect: Deny
            Principal: "*"
            Action: s3:*
            Resource:
              - !Sub "arn:${AWS::Partition}:s3:::${KiroActivityBucket}"
              - !Sub "arn:${AWS::Partition}:s3:::${KiroActivityBucket}/*"
            Condition:
              NumericLessThan:
                s3:TlsVersion: 1.2
